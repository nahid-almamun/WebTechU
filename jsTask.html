<body>
    <h2>Check Browser Console Output</h2>

    <!-- Check Prime Number -->
 
    <script>
        var num = 29;
        var isPrime = true;
    
        for (var i = 2; i < num; i++) {
        if (num % i === 0) {
        isPrime = false;
        break;
            }
        }
    
        if (isPrime) {
        console.log(num + " is a prime number.");
        }
        else {
        console.log(num + " is not a prime number.");
        }
    </script>

    

    <!-- Check Prime Number -->

    <script>
        var num = 5;
        var factorial =1;

        for(var i=num;i>0;i--) {
            factorial*= i;
        }

        console.log("Factorial of " + num + " is " + factorial);
    </script>

</body>
